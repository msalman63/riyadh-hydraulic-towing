<!-- WHY CHOOSE US SECTION -->
<section id="why" class="relative py-24 overflow-hidden" style="background: var(--zinc-950)">
  <!-- Ambient glow -->
  <div class="ambient-glow absolute inset-0 pointer-events-none"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 relative z-10">
    <!-- SECTION HEADER-->
    <div class="text-center mb-16 flex flex-col items-center gap-4">
      <!-- Tag pill -->
      <span
        class="inline-flex items-center bg-(--amber-glow) border border-(--amber-dark) [font-family: var(--font-ar)] px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest"
      >
        {{ languageService.tKey('whyTag') }}
      </span>

      <!-- Section title -->
      <h2
        class="font-black leading-tight [font-family: var(--font-ar)] text-[clamp(1.8rem, 5vw, 2.8rem)] text-(--white)"
      >
        {{ languageService.tKey('whyTitle') }}
      </h2>
    </div>

    <!-- WHY CARDS GRID-->
    <div class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-5">
      @for (item of items; track item.id) {
        <!-- ── Why Card -->
        <div
          class="relative bg-(--zinc-900) flex flex-col items-center text-center gap-4 p-6 border border-(--zinc-800) rounded-(--radius) hover:bg(--zinc-800) hover:border-(--amber-dark) hover:-translate-y-1.25 hover:shadow-sm transition-all duration-300 cursor-pointer"
        >
          <!-- Icon container -->
          <div
            class="w-14 h-14 bg-(--amber-glow) flex items-center justify-center text-2xl border border-(--amber-dark) rounded-sm"
          >
            {{ item.icon }}
          </div>

          <!-- Big stat number -->
          <div class="flex flex-col gap-0.5">
            <span
              class="font-black leading-none [font-family: var(--font-en)] text-[clamp(2rem, 4vw, 2.5rem)] text-(--amber)"
            >
              {{ item.stat }}
            </span>

            <!-- Unit label — smaller, below stat number -->
            <span class="text-xs font-semibold [font-family: var(--font-ar)] text-(--amber-dark)">
              {{ languageService.tr(item.unit) }}
            </span>
          </div>

          <!-- Card title — what the stat means -->
          <h3
            class="text-sm font-bold leading-snug [font-family: var(--font-ar)] text-(--zinc-300)"
          >
            {{ languageService.tr(item.title) }}
          </h3>

          <!-- Top amber glow line -->
          <div
            class="top-amber-line absolute top-0 left-0 right-0 h-0.5 rounded-t-2xl scale-x-0 hover:scale-x-100 transition-transform duration-300 origin-center"
          ></div>
        </div>
      }
    </div>
  </div>
</section>
