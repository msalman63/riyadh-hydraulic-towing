<!-- FLOATING ACTION BUTTONS -->
<div
  class="fixed bottom-6 inset-e-6 z-50 flex flex-col items-end gap-3"
  [class]="isVisible()
    ? 'float-visible'
    : 'float-hidden'">


  <!-- WhatsApp Button -->
  <div class="flex items-center gap-3 group">

    <!-- Hover label — slides in from side -->
    <span
      class="float-label opacity-0 group-hover:opacity-100
             translate-x-2 group-hover:translate-x-0
             rtl:-translate-x-2 rtl:group-hover:translate-x-0
             transition-all duration-200
             text-xs font-bold px-3 py-1.5 rounded-full
             bg-(--zinc-800) text-(--white) border border-(--zinc-700)
             [font-family:var(--font-ar)] whitespace-nowrap
             pointer-events-none">
      {{ languageservice.isArabic() ? 'واتساب' : 'WhatsApp' }}
    </span>

    <!-- WhatsApp button -->
    <a
      [href]="social.whatsappUrl"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="WhatsApp"
      class="w-14 h-14 flex items-center justify-center text-2xl
             rounded-full shadow-[0_4px_20px_rgba(37,211,102,0.3)]
             hover:scale-110 hover:shadow-[0_6px_28px_rgba(37,211,102,0.5)]
             active:scale-95 transition-all duration-200
             bg-[#25D366] text-white">
      💬
    </a>

  </div>


  <!--  Call Button -->
  <div class="flex items-center gap-3 group">

    <!-- Hover label -->
    <span
      class="float-label opacity-0 group-hover:opacity-100
             translate-x-2 group-hover:translate-x-0
             rtl:-translate-x-2 rtl:group-hover:translate-x-0
             transition-all duration-200
             text-xs font-bold px-3 py-1.5 rounded-full
             bg-(--zinc-800) text-(--white) border border-(--zinc-700)
             [font-family:var(--font-ar)] whitespace-nowrap
             pointer-events-none">
      {{ languageservice.isArabic() ? 'اتصل الآن' : 'Call Now' }}
    </span>

    <!-- Call circular button with pulse -->
    <a
      [href]="social.callUrl"
      aria-label="Call Now"
      class="float-pulse w-14 h-14 flex items-center justify-center text-2xl
             rounded-full bg-(--amber) text-(--black)
             shadow-[0_4px_20px_var(--amber-glow)]
             hover:bg-(--amber-light) hover:scale-110
             hover:shadow-[0_6px_28px_var(--amber-glow)]
             active:scale-95 transition-all duration-200">
      📞
    </a>

  </div>


</div>
